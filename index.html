<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Multiple JSON Files</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="styles.css">

    <!-- Highlight.js theme (dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <!-- Highlight.js script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Merge Multiple JSON Files</h1>
        <input type="file" id="fileInput" multiple accept=".json">
        <div class="button-container">
            <button id="mergeButton">Merge Files</button>
            <button id="downloadButton">Download Merged JSON</button>
        </div>
        
        <div id="output">
            <h2>Merged JSON:</h2>
            <pre><code id="mergedResult" class="language-json"></code></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
