<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Merger</title>
    <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/public/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png">
    <link rel="manifest" href="/public/site.webmanifest">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #mergeButton.loading { pointer-events: none; opacity: 0.9; }
        #mergeButton.loading::after {
            content: "";
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        #mergeButton.success { background: #10b981; }
        pre::-webkit-scrollbar { width: 8px; }
        pre::-webkit-scrollbar-thumb { background: #475569; border-radius: 5px; }
        .hljs-attr { color: #22c55e !important; }
        .hljs-string { color: #38bdf8 !important; }
        .hljs-number { color: #c084fc !important; }
    </style>

    <!-- Highlight.js theme (dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <!-- Highlight.js script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-gray-200 font-sans antialiased">
    <div class="max-w-3xl mx-auto my-12 p-8 rounded-2xl bg-slate-800/70 backdrop-blur-lg shadow-2xl border border-white/5 animate-[fadeIn_0.6s_ease]">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center size-14 rounded-xl bg-indigo-500/10 text-indigo-400 mb-4">
                <svg class="size-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h2m8 3c0-2-1-3-3-3m0 0V3m0 1v1m-7 5h10M7 13h4m-4 4h2"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">Merge Multiple JSON Files</h1>
            <p class="text-slate-400 mt-2">Select JSON files to merge them into a single output</p>
        </div>

            <div class="space-y-6">
            <div class="flex justify-center">
                <input type="file" id="fileInput" multiple accept=".json"
                       class="w-full max-w-md px-4 py-3 border-2 border-dashed border-slate-600 rounded-lg bg-slate-950/50 text-slate-400 cursor-pointer hover:border-indigo-500 transition-colors file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-indigo-500 file:text-white file:cursor-pointer hover:file:bg-indigo-400" />
            </div>

            <div id="progress-container" class="hidden w-full max-w-md mx-auto">
                <div class="flex justify-between text-sm text-slate-400 mb-1">
                    <span>Merging...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <progress id="progressBar" max="100" value="0" class="w-full h-2 rounded-full [&::-webkit-progress-bar]:bg-slate-700 [&::-webkit-progress-value]:bg-indigo-500 [&::-webkit-progress-value]:rounded-full"></progress>
            </div>

            <div class="flex justify-center gap-4">
                <button id="mergeButton" class="px-6 py-3 rounded-lg font-medium bg-gradient-to-r from-indigo-500 to-indigo-700 text-white hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/40 transition-all duration-200 inline-flex items-center gap-2">
                    <svg class="size-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h2m8 3c0-2-1-3-3-3m0 0V3m0 1v1m-7 5h10M7 13h4m-4 4h2"/>
                    </svg>
                    Merge Files
                </button>
                <button id="downloadButton" class="px-6 py-3 rounded-lg font-medium bg-gradient-to-r from-cyan-500 to-cyan-700 text-white hover:-translate-y-0.5 hover:shadow-lg hover:shadow-cyan-500/40 transition-all duration-200 hidden items-center gap-2">
                    <svg class="size-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0-4-4m4 4 4-4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                    </svg>
                    Download Merged JSON
                </button>
            </div>
        </div>

        <div id="output" class="mt-8 p-4 bg-slate-950 rounded-xl border border-slate-700">
            <h2 class="text-lg font-medium text-slate-300 mb-3 flex items-center gap-2">
                <svg class="size-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                </svg>
                Merged JSON
            </h2>
            <pre class="whitespace-pre-wrap break-words bg-slate-950 text-sky-400 p-4 rounded-lg text-sm max-h-80 overflow-y-auto leading-relaxed"><code id="mergedResult" class="language-json !bg-transparent !p-0"></code></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
